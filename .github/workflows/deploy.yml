name: Deploy to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # `wasm32-unknown-unknown` is the browser playground target.
          # `wasm32-wasip1` produces the standalone CLI windy.wasm that
          # any WASI host (wasmtime, wasmer, Node WASI) can run.
          targets: wasm32-unknown-unknown,wasm32-wasip1

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'

      - name: Build browser wasm package
        run: wasm-pack build --target web --release --out-dir web/pkg

      - name: Build WASI binary
        run: cargo build --target wasm32-wasip1 --release --bin windy

      - name: Stage WASI binary into web/
        run: cp target/wasm32-wasip1/release/windy.wasm web/windy.wasm

      - name: Stamp cache-bust version into web assets
        run: |
          # Sources contain `?v=__VERSION__` placeholders on every
          # asset URL (style.css, main.js, ./pkg/windy.js, windy_bg.wasm).
          # Replacing the placeholder with the short commit SHA
          # gives every deploy a unique URL per asset, so browsers
          # never serve a stale cached file after a push to main.
          # Local dev keeps the literal `__VERSION__` — static servers
          # ignore the query string, so the page renders correctly
          # without this CI step.
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "Cache-bust version: $SHORT_SHA"
          sed -i "s/__VERSION__/$SHORT_SHA/g" web/index.html web/main.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync site assets to S3 (excluding index.html and *.wasm)
        run: |
          if [ -z "$S3_BUCKET" ]; then
            echo "S3 bucket secret (AWS_S3_BUCKET) is missing."
            exit 1
          fi
          # index.html is the only entry point with a stable URL, so we
          # upload it separately with no-cache to guarantee browsers
          # see the new ?v=<sha> references on every deploy. Other
          # static assets are versioned by query string and can use
          # default headers — different ?v= = different cache key.
          aws s3 sync web/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "README.md" \
            --exclude ".*" \
            --exclude "*.wasm" \
            --exclude "index.html"

      - name: Upload index.html with no-cache header
        run: |
          aws s3 cp web/index.html "s3://${S3_BUCKET}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Upload .wasm files with application/wasm Content-Type
        run: |
          # `aws s3 sync` would tag .wasm as application/octet-stream.
          # Re-upload both wasm artifacts explicitly so browsers
          # stream-compile the playground module and `curl ... | wasmtime`
          # users get the right MIME type when they download the WASI
          # binary.
          aws s3 cp web/pkg/windy_bg.wasm "s3://${S3_BUCKET}/pkg/windy_bg.wasm" \
            --content-type "application/wasm"
          aws s3 cp web/windy.wasm "s3://${S3_BUCKET}/windy.wasm" \
            --content-type "application/wasm"

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
